unbind r
bind r source-file ~/.tmux.conf

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix
set -g prefix C-s

# General
set -g mouse on
set -g mode-keys vi
set -sg escape-time 0
set -g focus-events on
set -g history-limit 10000

# Windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Pane navigation (shared with vim-tmux-navigator)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# Linux: bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W *"

# Status bar
set-option -g status-position top
set -g @catppuccin_host_icon "󰟀"
set -g status-left "#{?SSH_CLIENT,#{E:@catppuccin_status_host},}"
set -g status-right-length 200
set -g update-environment "SSH_CLIENT"
set -g @catppuccin_date_time_text " %d/%m %H:%M"
set -g @catppuccin_directory_text " #{pane_current_path}"
set -g status-right " #{E:@catppuccin_status_directory} #{E:@catppuccin_status_date_time}"
set -g status-style bg=default

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'

# Initialize TMUX plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
