unbind r
bind r source-file ~/.tmux.conf

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix
set -g prefix C-s
bind C-s send-prefix

# General
set -g mouse on
set -g mode-keys vi
set -sg escape-time 0
set -g focus-events on
set -g history-limit 10000

# Windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Pane navigation (shared with vim-tmux-navigator)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy mode (Linux: setup.sh replaces pbcopy with tmux-clipboard at deploy time)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W *"

# Status bar
set-option -g status-position top
set -g status-left ""
set -g status-right-length 200
set -g status-right "#[fg=#cba6f7,bg=default] 󰍛 #{cpu_percentage} #[fg=#89dceb,bg=default] 󰘚 #{ram_percentage}"
set -g status-style bg=default

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TMUX plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
